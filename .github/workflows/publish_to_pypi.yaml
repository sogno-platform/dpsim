name: Publish DPsim package to Python Package Index (PyPI)

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-sdist:
    name: Build DPsim source distribution
    runs-on: ubuntu-24.04
    container: sogno/dpsim:dev
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set development version for Test PyPI
      if: "!startsWith(github.ref, 'refs/tags')"
      shell: bash
      run: python3 scripts/set_dev_version.py pyproject.toml ${{ github.run_number }}

    - name: Build DPsim source distribution
      shell: bash
      run: python3 -m build --sdist --outdir dist/

    - name: Archive Python source distribution
      uses: actions/upload-artifact@v7
      with:
        name: dist-source
        path: dist/

  build-wheels:
    name: Build DPsim Python wheel
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        platform: [manylinux_x86_64]
        python: [cp39, cp310, cp311, cp312, cp313]
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set development version for Test PyPI
      if: "!startsWith(github.ref, 'refs/tags')"
      shell: bash
      run: python3 scripts/set_dev_version.py pyproject.toml ${{ github.run_number }}

    - name: Build wheel
      uses: pypa/cibuildwheel@v3.4.1
      env:
        CIBW_BUILD: "${{ matrix.python }}-${{ matrix.platform }}"
        CIBW_MANYLINUX_X86_64_IMAGE: sogno/dpsim:manylinux
      with:
        output-dir: dist

    - name: Upload wheel as artifact
      uses: actions/upload-artifact@v7
      with:
        name: dist-wheels-${{ matrix.python }}-${{ matrix.platform }}
        path: dist/

  publish-testpypi:
    name: Publish wheels and source distribution to Test PyPI
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    permissions:
      id-token: write
    needs:
    - build-wheels
    - build-sdist

    steps:
    - name: Download wheels from build jobs
      uses: actions/download-artifact@v8
      with:
        pattern: dist-*
        merge-multiple: true
        path: dist/

    - name: Publish distribution to Test PyPI
      uses: pypa/gh-action-pypi-publish@v1.14.0
      with:
        repository-url: https://test.pypi.org/legacy/
        skip-existing: true

  publish-pypi:
    name: Publish wheels and source distribution to PyPI
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags') && !contains(github.ref, '-rc')
    permissions:
      id-token: write
    needs:
    - build-wheels
    - build-sdist

    steps:
    - name: Download wheels from build jobs
      uses: actions/download-artifact@v8
      with:
        pattern: dist-*
        merge-multiple: true
        path: dist/

    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@v1.14.0
