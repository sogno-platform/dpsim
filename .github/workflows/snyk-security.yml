name: Snyk Security

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk-code-and-oss:
    runs-on: sogno-platform-dpsim-runner
    permissions:
      contents: read
      security-events: write
      actions: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Snyk Code test
        continue-on-error: true
        run: snyk code test --sarif-file-output=snyk-code.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif

      - name: Snyk Open Source test for C/C++
        run: snyk test --unmanaged --severity-threshold=high

      - name: Snyk Open Source monitor for C/C++
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: snyk monitor --unmanaged --project-name=dpsim-cpp

      - name: Snyk Open Source test for Python
        run: snyk test --all-projects --detection-depth=3 --severity-threshold=high

      - name: Snyk Open Source monitor for Python
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: snyk monitor --all-projects --detection-depth=3 --project-name=dpsim-python

      - name: Snyk IaC test
        continue-on-error: true
        run: snyk iac test --severity-threshold=high

  snyk-containers:
    runs-on: sogno-platform-dpsim-runner
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: packaging/Docker/Dockerfile.dev-rocky
            image: sogno/dpsim:dev-rocky
          - dockerfile: packaging/Docker/Dockerfile
            image: sogno/dpsim:latest
          - dockerfile: packaging/Docker/Dockerfile.dev
            image: sogno/dpsim:dev
          - dockerfile: packaging/Docker/Dockerfile.dev-minimal
            image: sogno/dpsim:dev-minimal
          - dockerfile: packaging/Docker/Dockerfile.manylinux
            image: sogno/dpsim:manylinux
          - dockerfile: .binder/Dockerfile
            image: sogno/dpsim:binder

    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Check Dockerfile exists
        run: test -f "${{ matrix.dockerfile }}"

      - name: Build image
        run: docker build -f "${{ matrix.dockerfile }}" -t "${{ matrix.image }}" .

      - name: Snyk Container test
        run: snyk container test "${{ matrix.image }}" --file="${{ matrix.dockerfile }}" --severity-threshold=high

      - name: Snyk Container monitor
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: snyk container monitor "${{ matrix.image }}" --file="${{ matrix.dockerfile }}" --project-name="${{ matrix.image }}"
